<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكس بوكس ديجيتال | ألعاب رقمية في الأردن</title>
    
    <!-- إعدادات Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        xbox: { main: '#107C10', light: '#149F14', dark: '#0B590B' }
                    },
                    fontFamily: { sans: ['Tajawal', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبة لقراءة ملف جوجل شيت -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { background-color: #0d0d0d; color: #f3f4f6; font-family: 'Tajawal', sans-serif; }
        .glow-bg {
            position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
            width: 80%; height: 600px; background: radial-gradient(circle, rgba(16,124,16,0.15) 0%, rgba(13,13,13,0) 70%);
            z-index: 0; pointer-events: none;
        }
        .game-card { transition: all 0.3s ease; }
        .game-card:hover { transform: translateY(-5px); border-color: #107C10; box-shadow: 0 10px 30px -10px rgba(16,124,16,0.3); }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #107C10; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased selection:bg-xbox-main selection:text-white pb-20">

    <!-- Navbar -->
    <nav class="bg-black/80 border-b border-xbox-dark/30 sticky top-0 z-40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-xbox-main to-xbox-dark p-2.5 rounded-2xl shadow-[0_0_20px_rgba(16,124,16,0.3)]">
                        <i class="fa-brands fa-xbox text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-1">
                            إكس بوكس <span class="text-xbox-main">ديجيتال</span>
                        </h1>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="relative overflow-hidden">
        <div class="glow-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 relative z-10 text-center">
            <h2 class="text-4xl md:text-6xl font-black text-white mb-6 leading-tight">
                ألعاب إكس بوكس الرقمية <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-xbox-light to-xbox-main">بسعر الحرق!</span>
            </h2>
            <div class="relative group max-w-xl mx-auto mt-10">
                <div class="absolute inset-y-0 right-0 pr-5 flex items-center pointer-events-none text-gray-500">
                    <i class="fa-solid fa-search"></i>
                </div>
                <input type="text" id="searchInput" placeholder="ابحث عن لعبة، اشتراك، أو ريجون..." class="w-full bg-[#1a1a1a] border-2 border-[#2a2a2a] text-white rounded-2xl py-4 pr-14 pl-6 focus:outline-none focus:border-xbox-main transition-all text-lg shadow-2xl" onkeyup="filterGames()"/>
            </div>
        </div>
    </div>

    <!-- Games Catalog -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="catalog">
        
        <!-- حالة التحميل -->
        <div id="loadingState" class="text-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400 font-bold">جاري تحميل العروض من قاعدة البيانات...</p>
        </div>

        <div id="noResults" class="hidden text-center py-20 bg-[#141414] rounded-3xl border border-[#2a2a2a]">
            <i class="fa-solid fa-search text-5xl text-gray-600 mb-4"></i>
            <h4 class="text-2xl font-bold text-gray-300">لا يوجد نتائج</h4>
        </div>

        <!-- شبكة الألعاب -->
        <div id="gamesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <!-- Modal التفاصيل -->
    <div id="gameModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 sm:p-6 bg-black/90 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="bg-[#141414] border border-[#2a2a2a] w-full max-w-4xl rounded-[2rem] shadow-2xl relative flex flex-col md:flex-row max-h-[90vh] overflow-hidden transform scale-95 transition-transform duration-300" id="modalContent">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white bg-black/50 hover:bg-black w-10 h-10 flex items-center justify-center rounded-full transition-colors backdrop-blur-sm z-20"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="md:w-2/5 h-48 md:h-auto relative bg-black shrink-0">
                <img id="modalImage" src="" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-[#141414] md:bg-gradient-to-r md:from-transparent md:to-[#141414]"></div>
            </div>
            <div class="md:w-3/5 p-6 md:p-10 flex flex-col overflow-y-auto">
                <h3 id="modalTitle" class="text-2xl md:text-3xl font-black text-white mb-3"></h3>
                <div class="flex flex-wrap gap-2 mb-6" id="modalTags"></div>
                <div class="mb-6">
                    <h4 class="text-sm font-bold text-gray-500 mb-2 uppercase">وصف اللعبة</h4>
                    <p id="modalDesc" class="text-gray-300 leading-relaxed text-sm md:text-base"></p>
                </div>
                <div class="mb-8">
                    <h4 class="text-sm font-bold text-gray-500 mb-2 uppercase">المميزات</h4>
                    <ul id="modalFeatures" class="space-y-2 text-sm md:text-base text-gray-300"></ul>
                </div>
                <div class="mt-auto pt-6 border-t border-[#2a2a2a] flex flex-col sm:flex-row items-center justify-between gap-4 md:gap-6">
                    <div>
                        <div class="text-sm text-gray-500 mb-1">السعر النهائي</div>
                        <div class="flex items-baseline gap-2">
                            <span id="modalPrice" class="text-3xl md:text-4xl font-black text-xbox-light"></span>
                            <span class="text-xl font-bold text-gray-400">JOD</span>
                            <span id="modalOriginalPrice" class="text-lg text-gray-600 line-through ml-2"></span>
                        </div>
                    </div>
                    <button id="modalBuyBtn" class="w-full sm:w-auto flex items-center justify-center gap-3 bg-gradient-to-r from-[#25D366] to-[#1da851] text-white px-8 py-3.5 rounded-2xl font-black text-lg shadow-[0_10px_20px_rgba(37,211,102,0.2)] active:scale-95">
                        <i class="fa-brands fa-whatsapp text-2xl"></i> اطلب عبر واتساب
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- إعدادات المتجر وجلب البيانات -->
    <script>
        // ==========================================
        // 1. ضع رقمك هنا
        const WHATSAPP_NUMBER = "962798505839"; 
        
        // 2. ضع رابط ملف جوجل شيت (بصيغة CSV) هنا
        // لقد وضعت لك رابط تجريبي يعمل الآن لترى النتيجة
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrU7EkP6gCAPQnDzW4Dk3EHiGqz-5fQmF7mspQqyw8Yz-JD3lk8sQb28EDnHmSGT8nA1F2yYN_jal_/pub?output=csv";
        // ==========================================

        let ALL_GAMES = []; // سيتم تخزين الألعاب هنا بعد جلبها من جوجل

        // دالة جلب البيانات من جوجل شيت
        function fetchGames() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true, // يقرأ أول سطر في الإكسل كأسماء للأعمدة
                complete: function(results) {
                    const data = results.data;
                    
                    // تنظيف وتجهيز البيانات
                    ALL_GAMES = data.filter(row => row.title).map((row, index) => {
                        return {
                            id: index,
                            title: row.title,
                            price: row.price,
                            originalPrice: row.originalPrice || null,
                            type: row.type || "كود رقمي",
                            region: row.region || "عالمي",
                            image: row.image || "https://images.unsplash.com/photo-1605901309584-818e25960b8f?q=80&w=800",
                            features: row.features ? row.features.split('|') : ["تفعيل فوري"], // فصل المميزات بعلامة |
                            description: row.description || ""
                        };
                    });

                    // إخفاء التحميل وعرض الألعاب
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('gamesGrid').classList.remove('hidden');
                    renderGames(ALL_GAMES);
                },
                error: function(err) {
                    document.getElementById('loadingState').innerHTML = `<p class="text-red-500 font-bold">حدث خطأ أثناء جلب البيانات. تأكد من صحة رابط الشيت.</p>`;
                }
            });
        }

        const gamesGrid = document.getElementById('gamesGrid');
        const noResults = document.getElementById('noResults');
        const searchInput = document.getElementById('searchInput');
        const modal = document.getElementById('gameModal');

        function renderGames(gamesToRender) {
            gamesGrid.innerHTML = ''; 
            
            if(gamesToRender.length === 0) {
                gamesGrid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            gamesGrid.classList.remove('hidden');
            noResults.classList.add('hidden');

            gamesToRender.forEach(game => {
                const discountHTML = game.originalPrice ? `<div class="absolute top-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full text-xs font-black shadow-lg">وفر ${game.originalPrice - game.price} د.أ</div>` : '';
                const originalPriceHTML = game.originalPrice ? `<span class="text-sm text-gray-500 line-through block mb-0.5">${game.originalPrice} JOD</span>` : '';

                const cardHTML = `
                    <div class="game-card bg-[#141414] rounded-3xl overflow-hidden border border-[#2a2a2a] flex flex-col cursor-pointer" onclick="openModal(${game.id})">
                        <div class="relative h-56 overflow-hidden">
                            <img src="${game.image}" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity duration-300">
                            ${discountHTML}
                            <div class="absolute inset-0 bg-gradient-to-t from-[#141414] via-[#141414]/20 to-transparent"></div>
                        </div>
                        <div class="p-6 flex-grow flex flex-col -mt-10 relative z-10">
                            <h4 class="text-xl font-black text-white mb-3 line-clamp-2">${game.title}</h4>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="text-xs font-bold bg-[#1a1a1a] border border-[#333] px-2 py-1 rounded-lg text-gray-300"><i class="fa-solid fa-key text-xbox-light ml-1"></i>${game.type}</span>
                                <span class="text-xs font-bold bg-[#1a1a1a] border border-[#333] px-2 py-1 rounded-lg text-gray-300"><i class="fa-solid fa-globe text-blue-500 ml-1"></i>${game.region}</span>
                            </div>
                            <div class="mt-auto pt-4 border-t border-[#2a2a2a] flex items-center justify-between">
                                <div>
                                    ${originalPriceHTML}
                                    <div class="flex items-baseline gap-1 text-xbox-light">
                                        <span class="text-2xl font-black">${game.price}</span>
                                        <span class="text-xs font-bold">JOD</span>
                                    </div>
                                </div>
                                <button class="bg-xbox-main text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-cart-shopping"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                gamesGrid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function filterGames() {
            const query = searchInput.value.toLowerCase();
            const filtered = ALL_GAMES.filter(game => 
                game.title.toLowerCase().includes(query) || 
                game.region.toLowerCase().includes(query)
            );
            renderGames(filtered);
        }

        function openModal(gameId) {
            const game = ALL_GAMES.find(g => g.id === gameId);
            if(!game) return;

            document.getElementById('modalImage').src = game.image;
            document.getElementById('modalTitle').textContent = game.title;
            document.getElementById('modalDesc').textContent = game.description;
            document.getElementById('modalPrice').textContent = game.price;
            document.getElementById('modalOriginalPrice').textContent = game.originalPrice ? `${game.originalPrice} JOD` : '';

            document.getElementById('modalTags').innerHTML = `
                <span class="inline-flex items-center gap-1.5 text-sm font-bold bg-[#1a1a1a] text-xbox-light px-3 py-1.5 rounded-xl border border-xbox-main/30"><i class="fa-solid fa-key"></i> ${game.type}</span>
                <span class="inline-flex items-center gap-1.5 text-sm font-bold bg-[#1a1a1a] text-blue-400 px-3 py-1.5 rounded-xl border border-blue-900/30"><i class="fa-solid fa-globe"></i> ${game.region}</span>
            `;

            document.getElementById('modalFeatures').innerHTML = game.features.map(f => `
                <li class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-xbox-main shrink-0"></i> <span>${f}</span></li>
            `).join('');

            const buyMsg = `مرحباً، أريد شراء: ${game.title} %0Aالسعر: ${game.price} دينار.`;
            document.getElementById('modalBuyBtn').onclick = () => {
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${buyMsg}`, '_blank');
            };

            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modalContent').classList.remove('scale-95');
                document.getElementById('modalContent').classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            document.getElementById('modalContent').classList.remove('scale-100');
            document.getElementById('modalContent').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = 'auto'; }, 300);
        }

        // بدء جلب البيانات فور تحميل الصفحة
        window.onload = fetchGames;
    </script>
</body>
</html>
